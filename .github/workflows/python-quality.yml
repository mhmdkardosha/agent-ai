name: Python Quality

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Check formatting
        run: |
          ruff format --check .

      - name: Run linter
        run: |
          ruff check .

      - name: Install project with test extras
        run: |
          pip install -e ".[test]"

      - name: Run tests
        run: |
          pytest -v --tb=short